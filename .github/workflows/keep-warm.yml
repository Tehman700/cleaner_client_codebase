name: Keep Backend Warm

# Pings /health every 10 minutes during the peak-traffic window only:
#   04:00–10:59 UTC  ==  09:00–15:59 PKT  (UTC+5)
# The last ping at 15:50 PKT keeps Render warm through ~16:05 PKT, covering
# the full 09:00–16:00 PKT business window. Outside this window the backend
# is allowed to sleep, so it only consumes ~221 of Render's 750 free hours/mo.
#
# /health does NOT touch the database, so this adds zero load to Neon.
on:
  schedule:
    - cron: '*/10 4-10 * * *'
  workflow_dispatch: {}   # allows a manual ping from the Actions tab

env:
  BACKEND_URL: https://cleaner-client-codebase.onrender.com

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health to keep the backend awake
        run: |
          curl -s --max-time 60 --retry 3 --retry-all-errors --retry-delay 10 \
            "$BACKEND_URL/health" || true
