name: Analytics Daily Email

# Runs every day at 19:00 UTC == 00:00 Pakistan time (UTC+5).
# 1. Wakes the Render backend (free tier sleeps after inactivity)
# 2. Fetches the rendered analytics report HTML from the backend
# 3. Emails it via Gmail SMTP (GitHub runners are NOT SMTP-blocked, so Gmail works here)
# 4. Wipes analytics data once the 14-day interval has elapsed
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch: {}   # allows manual run from the Actions tab

env:
  BACKEND_URL: https://cleaner-client-codebase.onrender.com

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - name: Wake backend (handle Render cold start)
        run: |
          curl -s --max-time 150 --retry 6 --retry-all-errors --retry-delay 15 \
            "$BACKEND_URL/health" || true

      - name: Compute report date (PKT)
        id: d
        run: echo "date=$(date -u -d '+5 hours' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch analytics report HTML
        run: |
          code=$(curl -sS -o report.html -w "%{http_code}" --max-time 150 \
            --retry 4 --retry-all-errors --retry-delay 15 \
            "$BACKEND_URL/analytics/report.html?secret=${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $code"
          test "$code" = "200"

      - name: Send report via Gmail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "CleanTracking Analytics — ${{ steps.d.outputs.date }}"
          to: wguru2107@gmail.com
          from: CleanTracking <${{ secrets.GMAIL_USER }}>
          html_body: file://report.html

      - name: Reset analytics if 14 days elapsed
        run: |
          code=$(curl -sS -o /tmp/resp -w "%{http_code}" --max-time 150 \
            --retry 4 --retry-all-errors --retry-delay 15 \
            -X POST "$BACKEND_URL/analytics/maybe-reset" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $code"
          echo "Response: $(cat /tmp/resp)"
          test "$code" = "200"
