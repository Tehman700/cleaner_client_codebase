<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Blue rounded background -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>

  <!-- Window frame - outer -->
  <rect x="10" y="10" width="44" height="36" rx="3" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Window cross dividers -->
  <line x1="32" y1="10" x2="32" y2="46" stroke="white" stroke-width="3"/>
  <line x1="10" y1="28" x2="54" y2="28" stroke="white" stroke-width="3"/>

  <!-- Squeegee handle -->
  <line x1="38" y1="50" x2="54" y2="58" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Squeegee head -->
  <rect x="26" y="46" width="16" height="6" rx="3" fill="white"/>
</svg>
