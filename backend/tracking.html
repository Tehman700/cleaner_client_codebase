<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CleanTracking — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#fbf9f7; --surface:#fff; --surface-alt:#EEECE7;
    --text:#1b1c1b; --muted:#666; --border:rgba(0,0,0,.12); --border-strong:rgba(0,0,0,.25);
    --primary:#000; --accent:#ba1a1a;
    --fd:'Epilogue',sans-serif; --fb:'Hanken Grotesk',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:var(--fb); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
  h1,h2,h3 { font-family:var(--fd); }
  .caps { text-transform:uppercase; letter-spacing:.1em; font-weight:700; font-size:11px; }

  /* LOGIN */
  #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:var(--bg); }
  .login-card { width:100%; max-width:360px; }
  .login-title { font-size:48px; font-weight:800; letter-spacing:-.03em; text-transform:uppercase; line-height:.9; margin-bottom:10px; }
  .login-rule { height:1px; background:var(--primary); opacity:.15; margin-bottom:14px; }
  .login-sub { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:36px; }
  .fld { margin-bottom:20px; }
  .fld label { display:block; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .fld input { width:100%; padding:10px 0; border:none; border-bottom:1px solid var(--border-strong); background:transparent; font-size:15px; font-family:var(--fb); color:var(--text); outline:none; }
  .fld input:focus { border-bottom-color:var(--primary); }
  .btn { width:100%; padding:13px; background:var(--primary); color:#fff; border:1px solid var(--primary); font-family:var(--fb); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:.2s; }
  .btn:hover { background:var(--surface-alt); color:var(--primary); }
  .btn:disabled { opacity:.5; cursor:default; }
  .login-error { color:var(--accent); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-top:14px; min-height:16px; text-align:center; }

  /* DASHBOARD */
  #dashboard-screen { display:none; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:64px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:50; }
  .topbar h1 { font-size:18px; font-weight:700; letter-spacing:-.02em; text-transform:uppercase; }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .topbar-sub { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .logout { background:transparent; border:1px solid var(--primary); padding:7px 14px; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; font-family:var(--fb); transition:.2s; }
  .logout:hover { background:var(--primary); color:#fff; }

  .wrap { max-width:1100px; margin:0 auto; padding:28px 24px; }

  /* Filters */
  .filters { border:1px solid var(--border-strong); padding:18px; margin-bottom:24px; display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px; align-items:end; }
  .filters .fl { display:flex; flex-direction:column; gap:6px; }
  .filters label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .filters input, .filters select { padding:8px 6px; border:1px solid var(--border-strong); background:var(--surface); font-family:var(--fb); font-size:13px; color:var(--text); outline:none; }
  .filters input:focus, .filters select:focus { border-color:var(--primary); }
  .filter-actions { display:flex; gap:8px; }
  .filter-actions button { flex:1; padding:9px; font-family:var(--fb); font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; border:1px solid var(--primary); transition:.2s; }
  .btn-apply { background:var(--primary); color:#fff; }
  .btn-apply:hover { background:var(--surface-alt); color:var(--primary); }
  .btn-reset { background:transparent; color:var(--primary); }
  .btn-reset:hover { background:var(--surface-alt); }
  .gran-toggle { display:flex; border:1px solid var(--border-strong); }
  .gran-toggle button { flex:1; padding:8px; background:transparent; border:none; font-family:var(--fb); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; }
  .gran-toggle button.on { background:var(--primary); color:#fff; }

  /* Stat cards */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); border:1px solid var(--border); margin-bottom:24px; }
  .stat { padding:18px 14px; text-align:center; border-right:1px solid var(--border); }
  .stat:last-child { border-right:none; }
  .stat .n { font-family:var(--fd); font-size:30px; font-weight:800; letter-spacing:-.03em; line-height:1; }
  .stat .l { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:6px; }

  .panel { border:1px solid var(--border); padding:22px; margin-bottom:24px; }
  .panel-title { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:18px; display:flex; justify-content:space-between; align-items:baseline; }
  .panel-title .legend { font-size:9px; color:var(--muted); letter-spacing:.06em; font-weight:500; }
  .legend .sp { color:var(--accent); }

  /* Main bar chart */
  .chart { display:flex; align-items:flex-end; gap:2px; height:180px; }
  .bar-wrap { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end; }
  .bar { width:100%; background:var(--primary); min-height:2px; transition:height .5s cubic-bezier(.19,1,.22,1); position:relative; }
  .bar.spike { background:var(--accent); }
  .bar-lbl { font-size:8px; color:var(--muted); white-space:nowrap; transform:rotate(-60deg); transform-origin:center; height:36px; display:flex; align-items:flex-start; }

  /* Mini charts */
  .mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  @media(max-width:700px){ .mini-grid{grid-template-columns:1fr;} .stats{grid-template-columns:repeat(2,1fr);} }
  .mini-chart { display:flex; align-items:flex-end; gap:3px; height:110px; }
  .mini-chart .bar-wrap .bar-lbl { transform:none; height:auto; font-size:8px; }

  /* Breakdown */
  .brk-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
  .brk-row:last-child { border-bottom:none; }
  .brk-name { width:160px; flex-shrink:0; font-size:12px; }
  .brk-bg { flex:1; height:8px; background:var(--surface-alt); }
  .brk-fill { height:100%; background:var(--primary); transition:width .5s; }
  .brk-n { width:40px; text-align:right; font-weight:700; font-size:12px; }

  /* Table */
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { text-align:left; padding:8px 12px; font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border-strong); }
  td { padding:9px 12px; border-bottom:1px solid var(--border); }
  .chip { display:inline-block; padding:2px 8px; border:1px solid var(--primary); font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
  .mono { font-family:var(--fb); color:var(--muted); font-size:11px; }

  .empty { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner { width:16px; height:16px; border:1.5px solid var(--border-strong); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
  #loading { display:none; padding:14px 0; color:var(--muted); font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">Analytics</div>
    <div class="login-rule"></div>
    <div class="login-sub">CleanTracking — Restricted Access</div>
    <div class="fld">
      <label>Username</label>
      <input id="inp-user" type="text" autocomplete="username" />
    </div>
    <div class="fld">
      <label>Password</label>
      <input id="inp-pass" type="password" autocomplete="current-password" />
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <div class="topbar">
    <h1>CleanTracking — Analytics</h1>
    <div class="topbar-right">
      <span class="topbar-sub" id="updated"></span>
      <button class="logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="wrap">

    <!-- Filters -->
    <div class="filters">
      <div class="fl">
        <label>From</label>
        <input type="date" id="f-from" />
      </div>
      <div class="fl">
        <label>To</label>
        <input type="date" id="f-to" />
      </div>
      <div class="fl">
        <label>Event Type</label>
        <select id="f-type"><option value="">All events</option></select>
      </div>
      <div class="fl">
        <label>Role</label>
        <select id="f-role">
          <option value="">All roles</option>
          <option value="admin">Admin</option>
          <option value="cleaner">Cleaner</option>
        </select>
      </div>
      <div class="fl">
        <label>Granularity</label>
        <div class="gran-toggle">
          <button id="g-day" class="on" onclick="setGran('day')">Daily</button>
          <button id="g-month" onclick="setGran('month')">Monthly</button>
        </div>
      </div>
      <div class="fl">
        <label>&nbsp;</label>
        <div class="filter-actions">
          <button class="btn-apply" onclick="loadData()">Apply</button>
          <button class="btn-reset" onclick="resetFilters()">Reset</button>
        </div>
      </div>
    </div>

    <div id="loading"><span class="spinner"></span> Loading…</div>

    <div id="content">
      <!-- Stats -->
      <div class="stats">
        <div class="stat"><div class="n" id="s-total">—</div><div class="l">Total Events</div></div>
        <div class="stat"><div class="n" id="s-today">—</div><div class="l">Today</div></div>
        <div class="stat"><div class="n" id="s-avg">—</div><div class="l">Avg / Bucket</div></div>
        <div class="stat"><div class="n" id="s-peak">—</div><div class="l">Peak</div></div>
      </div>

      <!-- Main timeseries -->
      <div class="panel">
        <div class="panel-title">
          <span id="ts-title">Daily Traffic</span>
          <span class="legend"><span class="sp">▮</span> spike &nbsp;•&nbsp; ▮ normal</span>
        </div>
        <div class="chart" id="chart"></div>
      </div>

      <!-- Mini charts: hourly + weekday -->
      <div class="mini-grid">
        <div class="panel">
          <div class="panel-title">Peak Hours <span class="legend">by hour of day (PKT)</span></div>
          <div class="mini-chart" id="hourly"></div>
        </div>
        <div class="panel">
          <div class="panel-title">By Weekday</div>
          <div class="mini-chart" id="weekday"></div>
        </div>
      </div>

      <!-- Spikes + breakdown -->
      <div class="mini-grid">
        <div class="panel">
          <div class="panel-title">Spikes Detected</div>
          <div id="spikes"></div>
        </div>
        <div class="panel">
          <div class="panel-title">Event Breakdown</div>
          <div id="breakdown"></div>
        </div>
      </div>

      <!-- Recent -->
      <div class="panel">
        <div class="panel-title">Recent Activity</div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Time (PKT)</th><th>Event</th><th>Role</th><th>Details</th></tr></thead>
            <tbody id="recent"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let _token = sessionStorage.getItem('ct_token') || '';
  let _gran  = 'day';

  if (_token) showDashboard();

  ['inp-user','inp-pass'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));

  async function doLogin() {
    const user = document.getElementById('inp-user').value.trim();
    const pass = document.getElementById('inp-pass').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    if (!user || !pass) { errEl.textContent = 'Enter username and password'; return; }
    btn.disabled = true; btn.textContent = 'Signing in…'; errEl.textContent = '';
    try {
      const res = await fetch('/tracking/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username:user, password:pass }),
      });
      if (!res.ok) { const e = await res.json().catch(()=>({})); errEl.textContent = e.detail || 'Invalid credentials'; return; }
      const data = await res.json();
      _token = data.token;
      sessionStorage.setItem('ct_token', _token);
      showDashboard();
    } catch { errEl.textContent = 'Connection error'; }
    finally { btn.disabled = false; btn.textContent = 'Sign In'; }
  }

  function doLogout() {
    _token = ''; sessionStorage.removeItem('ct_token');
    document.getElementById('dashboard-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('inp-pass').value = '';
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadData();
  }

  function setGran(g) {
    _gran = g;
    document.getElementById('g-day').classList.toggle('on', g === 'day');
    document.getElementById('g-month').classList.toggle('on', g === 'month');
    loadData();
  }

  function resetFilters() {
    document.getElementById('f-from').value = '';
    document.getElementById('f-to').value = '';
    document.getElementById('f-type').value = '';
    document.getElementById('f-role').value = '';
    setGran('day');
  }

  async function loadData() {
    const p = new URLSearchParams({ token:_token, granularity:_gran });
    const from = document.getElementById('f-from').value;
    const to   = document.getElementById('f-to').value;
    const type = document.getElementById('f-type').value;
    const role = document.getElementById('f-role').value;
    if (from) p.set('date_from', from);
    if (to)   p.set('date_to', to);
    if (type) p.set('event_type', type);
    if (role) p.set('role', role);

    document.getElementById('loading').style.display = 'block';
    document.getElementById('content').style.opacity = '.4';
    try {
      const res = await fetch('/analytics/summary?' + p.toString());
      if (res.status === 403) { doLogout(); return; }
      if (!res.ok) throw new Error(res.status);
      render(await res.json());
      document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB');
    } catch (e) { alert('Failed to load: ' + e.message); }
    finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.opacity = '1';
    }
  }

  function render(d) {
    // Populate event-type filter once
    const sel = document.getElementById('f-type');
    if (sel.options.length <= 1 && d.event_types) {
      d.event_types.forEach(t => {
        const o = document.createElement('option'); o.value = t; o.textContent = t.replace(/_/g,' ');
        sel.appendChild(o);
      });
    }

    document.getElementById('s-total').textContent = d.total;
    document.getElementById('s-today').textContent = d.today_count;
    document.getElementById('s-avg').textContent   = d.avg_per_bucket;
    document.getElementById('s-peak').textContent  = d.peak ? d.peak.count : 0;

    document.getElementById('ts-title').textContent = _gran === 'month' ? 'Monthly Traffic' : 'Daily Traffic';

    // Main chart
    const ts = d.timeseries || [];
    const spikeKeys = new Set((d.spikes||[]).map(s => s.bucket));
    const mx = Math.max(...ts.map(b => b.count), 1);
    document.getElementById('chart').innerHTML = ts.map(b => {
      const h = Math.max(Math.round(b.count / mx * 100), b.count > 0 ? 3 : 0);
      const sp = spikeKeys.has(b.bucket) ? ' spike' : '';
      const lbl = _gran === 'month' ? b.bucket : b.bucket.slice(5);
      return `<div class="bar-wrap" title="${b.bucket}: ${b.count}">
                <div class="bar${sp}" style="height:${h}%"></div>
                <div class="bar-lbl">${lbl}</div>
              </div>`;
    }).join('') || '<div class="empty">No data</div>';

    // Hourly
    const hh = d.hourly || [];
    const hmx = Math.max(...hh.map(b => b.count), 1);
    document.getElementById('hourly').innerHTML = hh.map(b =>
      `<div class="bar-wrap" title="${b.hour}:00 — ${b.count}">
         <div class="bar" style="height:${Math.max(Math.round(b.count/hmx*100), b.count>0?4:0)}%"></div>
         <div class="bar-lbl">${b.hour}</div>
       </div>`).join('');

    // Weekday
    const wd = d.weekday || [];
    const wmx = Math.max(...wd.map(b => b.count), 1);
    document.getElementById('weekday').innerHTML = wd.map(b =>
      `<div class="bar-wrap" title="${b.day} — ${b.count}">
         <div class="bar" style="height:${Math.max(Math.round(b.count/wmx*100), b.count>0?4:0)}%"></div>
         <div class="bar-lbl">${b.day}</div>
       </div>`).join('');

    // Spikes
    const spikes = d.spikes || [];
    document.getElementById('spikes').innerHTML = spikes.length
      ? spikes.slice().reverse().map(s =>
          `<div class="brk-row"><div class="brk-name">${s.bucket}</div>
           <div class="brk-bg"><div class="brk-fill" style="width:100%;background:var(--accent)"></div></div>
           <div class="brk-n">${s.count}</div></div>`).join('')
      : '<div class="empty">No spikes in this range</div>';

    // Breakdown
    const by = d.by_type || {};
    const sorted = Object.entries(by).sort((a,b)=>b[1]-a[1]);
    const bmx = Math.max(...Object.values(by), 1);
    document.getElementById('breakdown').innerHTML = sorted.length
      ? sorted.map(([t,c]) =>
          `<div class="brk-row"><div class="brk-name">${t.replace(/_/g,' ')}</div>
           <div class="brk-bg"><div class="brk-fill" style="width:${Math.round(c/bmx*100)}%"></div></div>
           <div class="brk-n">${c}</div></div>`).join('')
      : '<div class="empty">No events</div>';

    // Recent
    const rec = d.recent || [];
    document.getElementById('recent').innerHTML = rec.length
      ? rec.map(e => `<tr>
          <td class="mono">${(e.created_at||'').slice(0,16).replace('T',' ')}</td>
          <td><span class="chip">${e.event_type.replace(/_/g,' ')}</span></td>
          <td>${e.role || '—'}</td>
          <td class="mono">${fmtMeta(e.metadata)}</td></tr>`).join('')
      : '<tr><td colspan="4" class="empty">No events</td></tr>';
  }

  function fmtMeta(m) {
    if (!m || !Object.keys(m).length) return '—';
    return Object.entries(m).map(([k,v]) => `${k}: ${v}`).join('  |  ');
  }
</script>
</body>
</html>
